<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Portfólio Claudiana</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
}

header {
    padding: 50px;
    font-size: 30px;
    font-weight: bold;
    color: white;
}

.card {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
}
</style>
</head>

<body>

<header>
👩‍💻 Claudiana Silva Carvalho
</header>

<div class="card">
<h2>Sobre mim</h2>
<p>Sou estudante de TI e gosto de aprender coisas novas.</p>
</div>

<div id="projetos"></div>

<script>
const projetos = [
  {nome: "Portfólio", descricao: "Meu primeiro site"},
  {nome: "Projeto futuro", descricao: "Em desenvolvimento"}
];

const area = document.getElementById("projetos");

projetos.forEach(p => {
  area.innerHTML += `
    <div class="card">
      <h3>${p.nome}</h3>
      <p>${p.descricao}</p>
    </div>
  `;
});
</script>

</body>
</html>
