<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Claudiana</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    text-align: center;
}

/* Cabeçalho */
header {
    background: #6a11cb;
    color: white;
    padding: 20px;
}

/* Seções */
section {
    padding: 20px;
}

/* Projetos */
#projetos div {
    background: #f4f4f4;
    margin: 10px auto;
    padding: 15px;
    width: 250px;
    border-radius: 10px;
}

/* Rodapé */
footer {
    background: #333;
    color: white;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    <h1>Claudiana Silva Carvalho</h1>
</header>

<section>
    <h2>Sobre mim</h2>
    <p>Sou estudante de TI, gosto de desafios e aprender coisas novas.</p>
</section>

<section>
    <h2>Meus Projetos</h2>
    <div id="projetos"></div>
</section>

<footer>
    <p>© 2026 - Claudiana</p>
</footer>

<script>
const projetos = [
    { nome: "Portfólio", descricao: "Meu primeiro site" },
    { nome: "Projeto 2", descricao: "Em desenvolvimento" }
];

const area = document.getElementById("projetos");

projetos.forEach(function(p) {
    const item = document.createElement("div");
    item.innerHTML = "<h3>" + p.nome + "</h3><p>" + p.descricao + "</p>";
    area.appendChild(item);
});
</script>

</body>
</html>
