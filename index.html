<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Claudiana</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    background: rgba(0,0,0,0.2);
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* SECTIONS */
section {
    padding: 40px;
    text-align: center;
}

/* CARDS */
.card {
    background: white;
    color: black;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
    width: 250px;
}

/* FLEX */
#projetos {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: rgba(0,0,0,0.2);
}

/* RESPONSIVO */
@media (max-width: 600px) {
    #projetos {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<header>
    <h2>Claudiana</h2>
    <nav>
        <a href="#sobre">Sobre</a>
        <a href="#projetos">Projetos</a>
    </nav>
</header>

<section id="sobre">
    <h2>Sobre mim</h2>
    <p>
        Sou estudante de TI, apaixonada por aprender coisas novas e desafios.
        Sou mãe, esposa e trabalho home office.
    </p>
</section>

<section>
    <h2>Meus Projetos</h2>
    <div id="projetos"></div>
</section>

<footer>
    <p>© 2026 - Claudiana Silva Carvalho</p>
</footer>

<script>
const projetos = [
    {
        nome: "Portfólio",
        descricao: "Site desenvolvido com HTML, CSS e JavaScript"
    },
    {
        nome: "Projeto em desenvolvimento",
        descricao: "Novos projetos em breve"
    }
];

const area = document.getElementById("projetos");

projetos.forEach(p => {
    area.innerHTML += `
        <div class="card">
            <h3>${p.nome}</h3>
            <p>${p.descricao}</p>
        </div>
    `;
});
</script>

</body>
</html>
