<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudiana Silva Carvalho | Portfólio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --pink:        #e91e8c;
      --pink-light:  #f472b6;
      --purple:      #7c3aed;
      --purple-light:#ddd6fe;
      --dark:        #0f0a1e;
      --dark2:       #1a1035;
      --white:       #ffffff;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', Arial, sans-serif;
      --radius:       16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--dark);
      color: var(--white);
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 0.75rem;
      font-weight: 500;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
      background: linear-gradient(135deg, var(--white) 30%, var(--pink-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .section-desc { color: #a78bfa; margin-bottom: 2.5rem; font-size: 1.05rem; }

    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      border-radius: 50px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
    }
    .btn:hover { transform: translateY(-3px); }
    .btn--primary {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: var(--white);
      box-shadow: 0 4px 20px rgba(233,30,140,0.4);
    }
    .btn--outline {
      border: 2px solid var(--purple-light);
      color: var(--purple-light);
      background: transparent;
    }
    .btn--outline:hover { background: rgba(124,58,237,0.15); }

    /* HEADER */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(15,10,30,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(124,58,237,0.2);
    }
    .header__inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--white);
      letter-spacing: 0.05em;
    }
    .logo span { color: var(--pink); }
    .nav { display: flex; gap: 2rem; }
    .nav a { font-size: 0.9rem; color: #c4b5fd; transition: color 0.2s; }
    .nav a:hover { color: var(--pink-light); }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--white);
      font-size: 1.5rem;
      cursor: pointer;
    }
    .nav-mobile {
      display: none;
      flex-direction: column;
      padding: 1rem 1.5rem 1.5rem;
      gap: 1rem;
      border-top: 1px solid rgba(124,58,237,0.2);
    }
    .nav-mobile a { color: #c4b5fd; font-size: 1rem; }
    .nav-mobile.open { display: flex; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 8rem 1.5rem 4rem;
      position: relative;
      overflow: hidden;
    }
    .hero__blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
    }
    .hero__blob--1 { width: 500px; height: 500px; background: var(--purple); top: -100px; left: -150px; }
    .hero__blob--2 { width: 400px; height: 400px; background: var(--pink); bottom: -100px; right: -100px; }
    .hero__content { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
    .hero__eyebrow {
      font-size: 1rem;
      color: var(--pink-light);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .hero__title {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1.5rem;
    }
    .hero__title span {
      background: linear-gradient(135deg, var(--pink), var(--purple-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero__sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #a78bfa;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }
    .hero__tag {
      position: absolute;
      background: rgba(124,58,237,0.25);
      border: 1px solid rgba(196,181,253,0.3);
      color: #c4b5fd;
      font-size: 0.75rem;
      padding: 0.4rem 0.9rem;
      border-radius: 50px;
      font-weight: 500;
      animation: float 4s ease-in-out infinite;
      pointer-events: none;
    }
    .hero__tag--1 { top: 20%; right: 10%; animation-delay: 0s; }
    .hero__tag--2 { top: 35%; right: 5%;  animation-delay: 0.8s; }
    .hero__tag--3 { top: 50%; right: 12%; animation-delay: 1.6s; }
    .hero__tag--4 { top: 65%; right: 7%;  animation-delay: 2.4s; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* SOBRE */
    .sobre { padding: 6rem 0; background: var(--dark2); }
    .sobre__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .sobre__text p { color: #c4b5fd; line-height: 1.8; margin-bottom: 1.2rem; }
    .sobre__text strong { color: var(--pink-light); }
    .sobre__skills { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-top: 1.5rem; }
    .sobre__skills span {
      background: rgba(233,30,140,0.15);
      border: 1px solid rgba(233,30,140,0.3);
      color: var(--pink-light);
      padding: 0.35rem 0.9rem;
      border-radius: 50px;
      font-size: 0.82rem;
    }
    .sobre__card {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(233,30,140,0.1));
      border: 1px solid rgba(196,181,253,0.2);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
    }
    .sobre__avatar {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem;
      box-shadow: 0 0 40px rgba(233,30,140,0.4);
    }
    .avatar-initials { font-family: var(--font-display); font-size: 1.6rem; font-weight: 900; color: var(--white); }
    .sobre__quote { font-family: var(--font-display); font-size: 1rem; font-style: italic; color: #e9d5ff; line-height: 1.6; }

    /* PROJETOS */
    .projetos { padding: 6rem 0; background: var(--dark); }
    .projetos__grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .projeto-card {
      background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(233,30,140,0.08));
      border: 1px solid rgba(196,181,253,0.18);
      border-radius: var(--radius);
      padding: 2rem;
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .projeto-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(233,30,140,0.2);
      border-color: rgba(233,30,140,0.4);
    }
    .projeto-card__emoji { font-size: 2rem; }
    .projeto-card__titulo { font-family: var(--font-display); font-size: 1.25
