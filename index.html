<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Claudiana</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* MENU */
header {
    background: #333;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* SEÇÕES */
section {
    padding: 40px;
    text-align: center;
}

/* SOBRE */
#sobre {
    background: #f4f4f4;
}

/* PROJETOS */
#projetos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.card {
    border: 1px solid #ccc;
    padding: 15px;
    width: 250px;
    border-radius: 10px;
}

/* RODAPÉ */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 15px;
}

/* RESPONSIVO */
@media (max-width: 600px) {
    #projetos {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<!-- CABEÇALHO -->
<header>
    <h2>Claudiana Silva</h2>
    <nav>
        <a href="#sobre">Sobre</a>
        <a href="#projetos">Projetos</a>
    </nav>
</header>

<!-- SOBRE -->
<section id="sobre">
    <h2>Sobre Mim</h2>
    <p>
        Sou estudante de TI, apaixonada por aprender coisas novas e desafios.
        Sou mãe, esposa e trabalho home office. Acredito no amor próprio e na autoestima.
    </p>
</section>

<!-- PROJETOS -->
<section>
    <h2>Meus Projetos</h2>
    <div id="projetos"></div>
</section>

<!-- RODAPÉ -->
<footer>
    <p>© 2026 - Claudiana Silva Carvalho</p>
</footer>

<!-- JAVASCRIPT -->
<script>
const projetos = [
    {
        nome: "Portfólio",
        descricao: "Meu primeiro site usando HTML e CSS"
    },
    {
        nome: "Projeto em andamento",
        descricao: "Aplicação que estou desenvolvendo"
    },
    {
        nome: "Futuro projeto",
        descricao: "Em breve mais novidades"
    }
];

const container = document.getElementById("projetos");

projetos.forEach(p => {
    const div = document.createElement("div");
    div.classList.add("card");

    div.innerHTML = `
        <h3>${p.nome}</h3>
        <p>${p.descricao}</p>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
