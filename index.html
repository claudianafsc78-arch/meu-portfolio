<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfólio Claudiana</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
}

/* MENU */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* SEÇÕES */
section {
    padding: 40px;
    text-align: center;
}

/* CARDS */
.card {
    background: white;
    color: black;
    margin: 20px auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
}

/* PROJETOS */
#projetos {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

/* RODAPÉ */
footer {
    text-align: center;
    padding: 20px;
}

/* RESPONSIVO */
@media (max-width: 600px) {
    header {
        flex-direction: column;
    }

    #projetos {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<!-- CABEÇALHO -->
<header>
    <h2>👩‍💻 Claudiana</h2>
    <nav>
        <a href="#sobre">Sobre</a>
        <a href="#projetos">Projetos</a>
    </nav>
</header>

<!-- SOBRE -->
<section id="sobre">
    <h2>Sobre mim</h2>
    <div class="card">
        <p>
        Olá! Meu nome é Claudiana Silva Carvalho.  
        Sou estudante de TI, apaixonada por aprender e enfrentar desafios.  
        Sou mãe, esposa e trabalho em home office.
        </p>
    </div>
</section>

<!-- PROJETOS -->
<section id="projetos-section">
    <h2>Meus Projetos</h2>
    <div id="projetos"></div>
</section>

<!-- RODAPÉ -->
<footer>
    <p>© 2026 - Claudiana Silva Carvalho</p>
</footer>

<!-- JAVASCRIPT -->
<script>
const projetos = [
    {
        nome: "Meu Portfólio",
        descricao: "Site criado com HTML, CSS e JavaScript"
    },
    {
        nome: "Projeto em andamento",
        descricao: "Estou desenvolvendo novos projetos"
    }
];

const container = document.getElementById("projetos");

projetos.forEach(p => {
    container.innerHTML += `
        <div class="card">
            <h3>${p.nome}</h3>
            <p>${p.descricao}</p>
        </div>
    `;
});
</script>

</body>
</html>
